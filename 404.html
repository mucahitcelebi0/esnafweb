<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sayfa Bulunamadı — EsnafWeb</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#16131f">
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #16131f; color: #fff; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .box b { display: block; font-size: 5rem; font-weight: 800; color: #ff5c1f; line-height: 1; }
    .box h1 { font-size: 1.5rem; margin: 18px 0 10px; font-weight: 700; }
    .box p { color: rgba(255,255,255,.65); margin-bottom: 28px; }
    .box a {
      display: inline-block; padding: 14px 30px; border-radius: 999px;
      background: linear-gradient(135deg, #ff5c1f 0%, #ff8046 100%);
      color: #fff; text-decoration: none; font-weight: 700;
      box-shadow: 0 10px 24px rgba(255,92,31,.35);
    }
  </style>
</head>
<body>
  <div class="box">
    <b>404</b>
    <h1>Aradığınız sayfa bulunamadı</h1>
    <p>Sayfa taşınmış ya da hiç var olmamış olabilir.</p>
    <a href="/">Ana Sayfaya Dön</a>
  </div>
</body>
</html>
